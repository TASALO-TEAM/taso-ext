<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASALO — New Tab</title>
  <style>
    :root {
      --bg: #09091e;
      --text: #eeeef8;
      --text2: #9090c0;
      --text3: #585878;
      --accent: #5b8aff;
      --up: #ff6b6b;
      --down: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: var(--text2); margin-bottom: 20px; }
    .error { color: var(--up); }
    .success { color: var(--down); }
    .data-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      width: 100%;
      max-width: 600px;
    }
    .rate-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .rate-row:last-child { border-bottom: none; }
    .rate-currency { font-weight: 600; }
    .rate-value { color: var(--accent); }
    .loading { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--text3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Cargando TASALO...</p>
    </div>
  </div>

  <script type="module">
    const browser = globalThis.browser || chrome;

    console.log('[NewTab] Script loaded');

    async function init() {
      try {
        console.log('[NewTab] Initializing...');
        
        // Load data from storage
        const data = await browser.storage.local.get([
          'settings',
          'currentRates',
          'rateChanges',
          'binanceRates',
          'lastUpdated',
          'fetchError'
        ]);

        console.log('[NewTab] Storage data:', data);

        const settings = data.settings || {};
        const rates = data.currentRates || {};
        const binanceRates = data.binanceRates || {};
        const lastUpdated = data.lastUpdated;
        const fetchError = data.fetchError;

        // Check if disabled
        if (settings.newTabEnabled === false) {
          showDisabled();
          return;
        }

        // Check for errors
        if (fetchError) {
          showError(fetchError);
          return;
        }

        // Check if we have data
        if (Object.keys(rates).length === 0) {
          showNoData();
          return;
        }

        // Show data
        showDashboard(rates, binanceRates, lastUpdated);

      } catch (error) {
        console.error('[NewTab] Error:', error);
        showError(error.message);
      }
    }

    function showDisabled() {
      document.getElementById('content').innerHTML = `
        <h1>⚠️ TASALO New Tab deshabilitado</h1>
        <p>La nueva pestaña está desactivada en las opciones.</p>
        <a href="https://www.google.com" class="btn">→ Ir a Google</a>
        <p style="margin-top:30px;font-size:12px;color:var(--text3)">
          Para habilitar: Click en ícono TASALO → ⚙️ → Activar Nueva Pestaña
        </p>
      `;
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <h1 class="error">❌ Error</h1>
        <p>${msg}</p>
        <button class="btn" onclick="location.reload()">🔄 Reintentar</button>
        <p style="margin-top:20px;font-size:12px;color:var(--text3)">
          Ver consola (F12) para más detalles
        </p>
      `;
    }

    function showNoData() {
      document.getElementById('content').innerHTML = `
        <h1>⏳ Cargando datos...</h1>
        <p>Esperando tasas de la API</p>
        <button class="btn" onclick="browser.runtime.sendMessage({type:'FETCH_NOW'}).then(() => location.reload())">
          🔄 Actualizar ahora
        </button>
        <p style="margin-top:20px;font-size:12px;color:var(--text3)">
          Los datos deberían cargarse en unos segundos
        </p>
      `;
    }

    function showDashboard(rates, binanceRates, lastUpdated) {
      const rateRows = Object.entries(rates)
        .slice(0, 6)
        .map(([cur, val]) => `
          <div class="rate-row">
            <span class="rate-currency">${cur}</span>
            <span class="rate-value">${val.toFixed(2)} CUP</span>
          </div>
        `)
        .join('');

      const binanceRows = Object.entries(binanceRates)
        .slice(0, 4)
        .map(([cur, val]) => `
          <div class="rate-row">
            <span class="rate-currency">${cur}</span>
            <span class="rate-value">${val.toFixed(2)} USDT</span>
          </div>
        `)
        .join('');

      const timeStr = lastUpdated 
        ? new Date(lastUpdated).toLocaleTimeString('es-CU', {hour: '2-digit', minute:'2-digit'})
        : '—';

      document.getElementById('content').innerHTML = `
        <h1>✅ TASALO</h1>
        <p class="success">Datos cargados correctamente</p>
        
        <div class="data-box">
          <h2 style="font-size:16px;margin-bottom:10px">📱 El Toque / BCC</h2>
          ${rateRows}
        </div>

        ${Object.keys(binanceRates).length > 0 ? `
        <div class="data-box">
          <h2 style="font-size:16px;margin-bottom:10px">🪙 Binance</h2>
          ${binanceRows}
        </div>
        ` : ''}

        <p style="font-size:12px;color:var(--text3);margin-top:20px">
          Última actualización: ${timeStr}
        </p>

        <button class="btn" onclick="location.reload()">🔄 Actualizar</button>
      `;
    }

    // Start
    init();
  </script>
</body>
</html>
